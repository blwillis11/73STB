class CfgModels
{
	class Default
	{
		sectionsInherit="";
		sections[] = {};
		skeletonName = "";
	};
	class HVAP1 : Default
	{
		htMin=1;		// Minimum half-cooling time (in seconds)
		htMax=600;	// Maximum half-cooling time (in seconds)
		afMax=0;		// Maximum temperature in case the model is alive (in celsius)
		mfMax=0;		// Maximum temperature when the model is moving (in celsius)
		mFact=1;		// Metabolism factor - number from interval <0, 1> (0 - metabolism has no influence, 1 - metabolism has full influence (no other temperature source will be considered)).
		tBody=100;	 // Metabolism temperature of the model (in celsius)

		skeletonName="HVAP1_Skeleton";
		sectionsInherit="";
		sections[]=
		{
			"zasleh",
			"camo"
		};
		class Animations
		{
			class zaslehROT
			{
				type = "rotationX";
				source = "ammoRandom";
				sourceAddress = "loop";
				selection = "zasleh";     // must exist as geometry in Res LOD
				axis = "";
				centerFirstVertex = true;
				minValue = 0;
				maxValue = 4;
				angle0 = "rad 0";
				angle1 = "rad 360";
			};
			class no_magazine
			{
				type="hide";
				source="hasmagazine";
				selection="magazine";
				sourceAddress="clamp";
				minPhase=0;
				maxPhase=1;
				minValue=0;
				maxValue=1;
				hideValue=0.5;
				memory=0;
				unHideValue = -1.0;
			};
			class magazine_hide
			{
				type="hide";
				source="reloadMagazine";
				sourceAddress="clamp";
				selection="magazine";
				minPhase=0;
				maxPhase=1;
				minValue=0;
				maxValue=1;
				memory=0;
				hideValue=0.10;
			};
			};
			class magazine_unhide
			{
				type="hide";
				source="reloadMagazine";
				sourceAddress="clamp";
				selection="magazine";
				minPhase=0;
				maxPhase=1;
				minValue=0;
				maxValue=1;
				memory=0;
				unHideValue = 0.5;
			};
			class bolt_fire_begin
			{
				type="translation";
				source="reload";
				selection="bolt";
				axis="bolt_axis";
				memory=0;
				minValue=0.000000;
				maxValue=1;
				offset0=0;
				offset1=-180;
			};
			class bolt_fire_end:bolt_fire_begin
			{
				minValue=0.500000;
				maxValue=1.000000;
				offset0=0;
				offset1=180;
			};
			class bolt_empty: bolt_fire_begin{
				source = "isEmptyNoReload";
				minValue = 0;
				maxValue = 1;
				offset0 = 0;
				offset1 = -85;
			};
			class bolt_reload_begin:bolt_empty
			{
				source="reloadMagazine";
				minValue=0.1;
				maxValue=0.15;
				offset0 = 0;
				offset1 = -85;
			};
			class bolt_reload_end:bolt_reload_begin
			{
				minValue=0.88;
				maxValue=0.95;
				offset0=0;
				offset1=85;
			};
		};
	};
};
